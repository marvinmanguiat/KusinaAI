spring.application.name=KusinaAI

server.forward-headers-strategy=framework

# Gemini settings
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.0-flash
app.gemini.fallback-models=gemini-1.5-flash,gemini-1.5-pro
app.gemini.cooldown-minutes=60
app.gemini.cache-minutes=30
app.gemini.model-discovery-cache-minutes=180
app.menu.daily-search-limit=5

# JWT settings
app.security.jwt.secret=Zm9yLWt1c2luYS1haS1kZXZlbG9wbWVudC1vbmx5LWNoYW5nZS1tZS1iZWZvcmUtcHJvZA==
app.security.jwt.expiration-ms=3600000
# This is where the backend sends the browser after social login succeeds or fails.
app.security.oauth2.frontend-callback-url=${OAUTH2_FRONTEND_CALLBACK_URL}

# CORS origin for React dev server
app.security.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

# OAuth2 (Google / Facebook) configuration
# Set these environment variables in your local/prod environment:
# GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, FACEBOOK_CLIENT_ID, FACEBOOK_CLIENT_SECRET
# The provider redirect URI must point to the backend callback, not the frontend callback.
# Local development redirect URIs to register in Google/Facebook:

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:replace-me-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:replace-me-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:replace-me-facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:replace-me-facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=email
spring.security.oauth2.client.registration.facebook.redirect-uri=${FACEBOOK_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:kusinaai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional mail configuration for forgot-password temporary password emails.
# Set these in a real environment to enable actual delivery.
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
